spring:
  application:
    name: japanese-vocab-backend
  datasource:
    url: ${JP_DB_URL:jdbc:postgresql://localhost:5432/jp_vocab}
    username: ${JP_DB_USERNAME:jp}
    password: ${JP_DB_PASSWORD:jp}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    bootstrap:
      enabled: ${APP_AUTH_BOOTSTRAP_ENABLED:true}
      username: ${APP_AUTH_BOOTSTRAP_USERNAME:demo}
      password: ${APP_AUTH_BOOTSTRAP_PASSWORD:demo123456}
      display-name: ${APP_AUTH_BOOTSTRAP_DISPLAY_NAME:Demo User}
      preferred-learning-order: ${APP_AUTH_BOOTSTRAP_PREFERRED_LEARNING_ORDER:WORD_FIRST}
  export:
    base-dir: ${APP_EXPORT_BASE_DIR:exports}
  backup:
    base-dir: ${APP_BACKUP_BASE_DIR:backups}

logging:
  level:
    org.flywaydb: info
    org.springframework.web: info
